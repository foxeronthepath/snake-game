<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Benchmark — 50 partite automatiche per testare gli autopilot"
    />
    <title>Benchmark — Snake Game</title>
    <link rel="icon" href="./assets/favicon.png" type="image/png" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="benchmark.css" />
  </head>
  <body>
    <div class="snow-container"></div>

    <main class="game-container benchmark-page">
      <header class="header">
        <div class="header-top">
          <h1>Benchmark</h1>
          <div class="score" aria-live="polite">
            <span id="progress-text">Round 0/5 · Games 0/50</span>
          </div>
        </div>
        <p class="benchmark-subtitle" id="benchmark-subtitle">
          10 griglie in parallelo · simulazione accelerata
        </p>
        <a class="benchmark-back-link" href="index.html">← Torna al gioco</a>
      </header>

      <section class="controls benchmark-toolbar">
        <div class="buttons">
          <div class="benchmark-select-wrap">
            <select id="autopilot-select" class="benchmark-select" aria-label="Seleziona autopilota">
              <option value="hamilton">Hamilton Solver</option>
              <option value="smart">Smart Autopilot</option>
              <option value="lawnmower">Lawnmower</option>
            </select>
          </div>
          <div class="benchmark-select-wrap">
            <select id="rounds-select" class="benchmark-select" aria-label="Numero di round">
              <option value="1">1 round</option>
              <option value="3">3 round</option>
              <option value="5" selected>5 round</option>
              <option value="10">10 round</option>
              <option value="20">20 round</option>
            </select>
          </div>
          <div class="benchmark-select-wrap">
            <select id="speed-select" class="benchmark-select" aria-label="Velocità simulazione">
              <option value="normal" selected>Normale · 150ms</option>
              <option value="fast">Veloce · 10ms</option>
              <option value="turbo">Turbo · 1ms</option>
              <option value="extreme">Extreme · 1ms burst</option>
            </select>
          </div>
          <button id="start-btn" type="button">Avvia benchmark</button>
          <button id="reset-btn" type="button">Reset</button>
        </div>
      </section>

      <section id="grids-container" aria-label="Griglie benchmark"></section>

      <section id="report-panel" class="hidden" aria-live="polite">
        <h2>Report finale</h2>
        <div id="report-body"></div>
      </section>
    </main>

    <label class="switch" id="snow-switch-container">
      <input type="checkbox" id="bottom-left-switch" checked />
      <span class="switch-tooltip" id="switch-tooltip">Snow OFF</span>
    </label>

    <div class="developer-credit">
      <div class="logo-container">
        <div class="logo-circle">
          <img
            src="./assets/logo.png"
            alt="Developer Logo"
            class="logo-image"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
          />
          <span
            class="logo-fallback"
            style="display: none; color: white; font-size: 16px; font-weight: bold; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);"
            >R</span
          >
        </div>
        <span class="nickname">foxeronthepath</span>
      </div>
    </div>

    <script src="./js/snow.js"></script>
    <script src="./js/autopilot.js"></script>
    <script src="./js/hamilton-solver.js"></script>
    <script src="./js/benchmark.js"></script>
  </body>
</html>
